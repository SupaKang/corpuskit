name: release

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token stored.
# One-time setup on PyPI: add a Trusted Publisher for this repo
#   (owner=SupaKang, repo=corpuskit, workflow=release.yml, environment=pypi).
# Release: bump version in pyproject.toml -> create a GitHub Release (tag vX.Y.Z).

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # configure this env's trusted publisher on PyPI
    permissions:
      id-token: write          # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
